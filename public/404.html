<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Redirection...</title>
    <script>
      // SPA redirect for GitHub Pages
      // Redirects 404 to index.html with the path stored in sessionStorage
      var base = '/cdm-2026/'
      var path = window.location.pathname
      if (path.startsWith(base)) {
        path = path.slice(base.length)
      }
      sessionStorage.setItem('spa-redirect', path + window.location.search + window.location.hash)
      window.location.replace(base)
    </script>
  </head>
  <body></body>
</html>
